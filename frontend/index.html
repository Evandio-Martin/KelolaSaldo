<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Primary SEO -->
    <title>KelolaSaldo</title>
    <meta
      name="description"
      content="KelolaSaldo adalah aplikasi pencatat keuangan berbahasa Indonesia untuk memantau pemasukan, pengeluaran, anggaran, dan laporan bulanan dalam satu tempat."
    />
    <meta
      name="keywords"
      content="keuangan pribadi, pencatat uang, anggaran, transaksi, laporan, react, vite"
    />
    <meta name="author" content="KelolaSaldo" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://react-startup-project.vercel.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://react-startup-project.vercel.app"
    />
    <meta property="og:title" content="KelolaSaldo" />
    <meta
      property="og:description"
      content="KelolaSaldo membantu Anda mencatat transaksi, mengatur anggaran, dan memantau arus kas harian dengan tampilan yang sederhana."
    />
    <meta
      property="og:image"
      content="https://react-startup-project.vercel.app/og_image.webp"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="KelolaSaldo" />
    <meta property="og:locale" content="id_ID" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@your_twitter_handle" />
    <meta name="twitter:title" content="KelolaSaldo" />
    <meta
      name="twitter:description"
      content="KelolaSaldo membantu Anda mencatat pemasukan, pengeluaran, dan anggaran bulanan dalam satu dashboard."
    />
    <meta
      name="twitter:image"
      content="https://react-startup-project.vercel.app/og_image.webp"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/index.jsx"></script>
  </body>
</html>
